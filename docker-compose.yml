services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kiln_user
      POSTGRES_PASSWORD: kiln_password
      POSTGRES_DB: kiln_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiln_user -d kiln_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://kiln_user:kiln_password@db:5432/kiln_db
      SCAN_INTERVAL_MINUTES: 1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
